<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Agora Grid Layout</title>
  <style>
    body { margin:0; display:flex; height:100vh; overflow:hidden; font-family:sans-serif; }
    #message { position:absolute; top:10px; left:10px; background:rgba(255,255,255,0.9); padding:8px; border-radius:4px; z-index:10; }
    #gridContainer { position:relative; flex:1; background:#fff; }
    #grid { display:grid; grid-template-columns:repeat(80,1fr); grid-template-rows:repeat(45,1fr); gap:1px; width:100%; height:100%; }
    .cell { background:#f0f0f0; border:1px solid #ddd; aspect-ratio:1/1; }
    .placed { position:absolute; overflow:hidden; }
    .placed img, .placed video { width:100%; height:100%; object-fit:cover; pointer-events:none; }
  </style>
</head>
<body>
  <div id="message"></div>
  <div id="gridContainer"><div id="grid"></div></div>
  <script>
    const cols=80, rows=45, gap=1;
    const gridContainer=document.getElementById('gridContainer');
    const grid=document.getElementById('grid');
    const message=document.getElementById('message');
    // build grid
    for(let i=0;i<cols*rows;i++){const c=document.createElement('div');c.className='cell';grid.appendChild(c);}    
    // helpers
    function gcd(a,b){return b?gcd(b,a%b):a;}
    function getSizes(){
      const r=gridContainer.getBoundingClientRect();
      const totalGap=(rows-1)*gap;
      const cellSize=(r.height-totalGap)/rows;
      return { size:cellSize, step:cellSize+gap };
    }
    // parse folder
    const p=new URLSearchParams(location.search);
    const folder=p.get('folder');
    if(!folder){message.textContent='Error: ?folder=name';throw'';}
    message.textContent=`Folder: ${folder}`;
    // load layout
    const key=`layout_${folder}`;
    const raw=localStorage.getItem(key);
    if(!raw){message.textContent=`No layout for '${folder}'`;throw'';}
    let items=JSON.parse(raw);
    const {size,step}=getSizes();

    function render(){
      gridContainer.querySelectorAll('.placed').forEach(el=>el.remove());
      items.forEach(item=>{
        const colsSpan=item.cols, rowsSpan=item.rows;
        const col=Math.min(Math.max(0,item.col),cols-colsSpan);
        const row=Math.min(Math.max(0,item.row),rows-rowsSpan);
        const w=colsSpan*size+(colsSpan-1)*gap;
        const h=rowsSpan*size+(rowsSpan-1)*gap;
        const wrap=document.createElement('div');
        wrap.className='placed';
        wrap.style.left=`${col*step}px`;
        wrap.style.top=`${row*step}px`;
        wrap.style.width=`${w}px`;
        wrap.style.height=`${h}px`;
        const ext=item.src.split('.').pop().toLowerCase();
        const media=document.createElement(/\.(mp4|webm)$/i.test(item.src)?'video':'img');
        if(media.tagName==='VIDEO')media.controls=true;
        media.src=item.src;
        wrap.appendChild(media);
        gridContainer.appendChild(wrap);
      });
    }

    render();

    // live update when layout changes in another tab
    window.addEventListener('storage', e=>{
      if(e.key===key){
        items = e.newValue ? JSON.parse(e.newValue) : [];
        render();
      }
    });
  </script>
</body>
</html>
