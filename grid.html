<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Agora Grid Layout</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&display=swap');
    body { margin:0; display:flex; height:100vh; overflow:hidden; font-family:sans-serif; justify-content:center; align-items:center; }
    #controls { position:absolute; top:10px; left:10px; background:rgba(255,255,255,0.9); padding:8px; border-radius:4px; z-index:10; display:flex; gap:8px; align-items:center; }
    #message { margin:0; }
    #viewport { position:relative; overflow:hidden; width:80vmin; height:calc(80vmin*9/16); border:3px solid #1449ff; }
    #gridContainer { position:absolute; top:50%; left:50%; width:100vw; height:100vh; transform:translate(-50%,-50%); background:#fff; }
    #grid { display:grid; grid-template-columns:repeat(80,1fr); grid-template-rows:repeat(45,1fr); gap:1px; width:100%; height:100%; }
    .cell { background:none; border:1px solid #1449ff; aspect-ratio:1/1; }
    .placed { position:absolute; overflow:hidden; }
    .placed img, .placed video { width:100%; height:100%; object-fit:cover; pointer-events:none; }
    .text-item { width:100%; height:100%; display:flex; align-items:center; justify-content:center; font-family:'Outfit', sans-serif; }
  </style>
</head>
<body>
  <div id="controls"><div id="message"></div><select id="folderSelect"></select></div>
  <div id="viewport">
    <div id="gridContainer"><div id="grid"></div></div>
  </div>
  <script>
  (async function(){
    const cols=80, rows=45, gap=1;
    const gridContainer=document.getElementById('gridContainer');
    const grid=document.getElementById('grid');
    const message=document.getElementById('message');
    const folderSelect=document.getElementById('folderSelect');
    for(let i=0;i<cols*rows;i++){const c=document.createElement('div');c.className='cell';grid.appendChild(c);}
    function getSizes(){
      const r=gridContainer.getBoundingClientRect();
      const totalGap=(rows-1)*gap;
      const cellSize=(r.height-totalGap)/rows;
      return { size:cellSize, step:cellSize+gap };
    }

    let folders=[];
    try{
      folders = await (await fetch('/static/pf/folders.json')).json();
      folderSelect.innerHTML = folders.map(f=>`<option value="${f}">${f}</option>`).join('');
    }catch(e){
      message.textContent='No folders available';
      return;
    }

    let folder=new URLSearchParams(location.search).get('folder')||folders[0];
    folderSelect.value=folder;
    let key=`layout_${folder}`;
    let raw=localStorage.getItem(key);
    let items=raw?JSON.parse(raw):[];
    message.textContent=`Folder: ${folder}`;
    const viewport=document.getElementById('viewport');
    let offsetX=0,offsetY=0;
    function applyTransform(){
      gridContainer.style.transform=`translate(calc(-50% + ${offsetX}px), calc(-50% + ${offsetY}px))`;
    }

    function render(){
      const {size,step}=getSizes();
      gridContainer.querySelectorAll('.placed').forEach(el=>el.remove());
      items.forEach(item=>{
        const colsSpan=item.cols, rowsSpan=item.rows;
        const col=Math.min(Math.max(0,item.col),cols-colsSpan);
        const row=Math.min(Math.max(0,item.row),rows-rowsSpan);
        const w=colsSpan*size+(colsSpan-1)*gap;
        const h=rowsSpan*size+(rowsSpan-1)*gap;
        const wrap=document.createElement('div');
        wrap.className='placed';
        wrap.style.left=`${col*step}px`;
        wrap.style.top=`${row*step}px`;
        wrap.style.width=`${w}px`;
        wrap.style.height=`${h}px`;
        let media;
        if(item.type==='text'){
          media=document.createElement('div');
          media.className='text-item';
          media.textContent=item.text||'';
        }else{
          media=document.createElement(/\.(mp4|webm)$/i.test(item.src)?'video':'img');
          if(media.tagName==='VIDEO'){
            media.controls=false;
            media.autoplay=true;
            media.loop=true;
            media.muted=true;
            media.playsInline=true;
          }
          media.src=item.src;
        }
        wrap.appendChild(media);
        gridContainer.appendChild(wrap);
      });
    }

    function loadLayout(name){
      key=`layout_${name}`;
      const raw=localStorage.getItem(key);
      items=raw?JSON.parse(raw):[];
      message.textContent=raw?`Folder: ${name}`:`No layout for '${name}'`;
      render();
    }

    folderSelect.addEventListener('change',()=>{
      folder=folderSelect.value;
      history.replaceState(null,'',`?folder=${encodeURIComponent(folder)}`);
      loadLayout(folder);
    });

    render();

    viewport.addEventListener('mousemove',e=>{
      const rect=viewport.getBoundingClientRect();
      const {size,step}=getSizes();
      const gridW=cols*size+(cols-1)*gap;
      const gridH=rows*size+(rows-1)*gap;
      const maxX=Math.max(0,(gridW-rect.width)/2);
      const maxY=Math.max(0,(gridH-rect.height)/2);
      const margin=60;
      const pan=step/4;
      let moved=false;
      if(e.clientX-rect.left<margin) {offsetX=Math.min(offsetX+pan,maxX);moved=true;}
      else if(rect.right-e.clientX<margin) {offsetX=Math.max(offsetX-pan,-maxX);moved=true;}
      if(e.clientY-rect.top<margin) {offsetY=Math.min(offsetY+pan,maxY);moved=true;}
      else if(rect.bottom-e.clientY<margin) {offsetY=Math.max(offsetY-pan,-maxY);moved=true;}
      if(moved) applyTransform();
    });

    applyTransform();

    window.addEventListener('storage', e=>{
      if(e.key===key){
        items = e.newValue ? JSON.parse(e.newValue) : [];
        render();
      }
    });
  })();
  </script>
</body>
</html>
