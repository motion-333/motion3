<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Agora Grid Builder</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&display=swap');
    body { margin: 0; display: flex; height: 100vh; font-family: sans-serif; }
    #sidebar { width: 250px; border-right: 1px solid #ccc; padding: 10px; box-sizing: border-box; overflow-y: auto; }
    #sidebar h3 { margin-top: 0; }
    #folderSelect, .draggable-item { width: 100%; margin-bottom: 10px; cursor: grab; }
    #gridContainer { flex: 1; position: relative; background: #fff; }
    #grid { display: grid; grid-template-columns: repeat(80,1fr); grid-template-rows: repeat(45,1fr); gap:1px; width:100%; height:100%; }
    .cell { background:none; border:1px solid #1449ff; aspect-ratio:1/1; }
    .placed { position:absolute; overflow:hidden; cursor: move; border:2px solid #1449ff; box-sizing:border-box; }
    .placed img, .placed video { width:100%; height:100%; object-fit:cover; pointer-events:none; }
    .text-item {
      width:100%;
      height:100%;
      display:block;
      font-family:'Outfit', sans-serif;
      background:#fff;
      margin:0;
      padding:0;
      white-space:pre-wrap;
      box-sizing:border-box;
      outline:none;
    }
    #addTextBtn { width:100%; margin-top:10px; }
  </style>
</head>
<body>
  <div id="sidebar">
    <h3>Select Folder</h3>
    <select id="folderSelect"><option disabled selected>Loading folders...</option></select>
    <h3>Files</h3>
    <div id="fileList">Select a folder to load files.</div>
    <button id="addTextBtn">Add Text</button>
  </div>
  <div id="gridContainer"><div id="grid"></div></div>
  <script>
    const cols=80, rows=45, gap=1, minCells=8;
    const gridContainer=document.getElementById('gridContainer'), grid=document.getElementById('grid');
    const folderSelect=document.getElementById('folderSelect'), fileList=document.getElementById('fileList'), addTextBtn=document.getElementById('addTextBtn');

    // Build grid
    for(let i=0;i<cols*rows;i++){const c=document.createElement('div');c.className='cell';grid.appendChild(c);}    

    function gcd(a,b){return b?gcd(b,a%b):a;}
    function getSizes(){
      const r=gridContainer.getBoundingClientRect();
      const size=(r.width-(cols-1)*gap)/cols;
      return { size, step:size+gap };
    }

    // Load folders
    fetch('/static/pf/folders.json')
      .then(r=>r.json()).then(fs=>{folderSelect.innerHTML='<option disabled selected>Select folder</option>'+fs.map(f=>`<option value="${f}">${f}</option>`).join('');})
      .catch(_=>folderSelect.innerHTML='<option disabled>Error</option>');

    // On folder change
    folderSelect.addEventListener('change',()=>{
      const folder=folderSelect.value;fileList.innerHTML='';
      fetch(`/static/pf/${folder}/files.json`).then(r=>{if(!r.ok)throw'';return r.json();}).then(files=>{
        files.forEach(file=>{
          const el=(file.type==='video')?document.createElement('video'):document.createElement('img');
          if(file.type==='video'){el.controls=true;el.loop=true;el.autoplay=true;el.muted=true;}
          el.src=file.src;el.className='draggable-item';el.draggable=true;
          el.dataset.src=file.src;
          el.dataset.type=file.type;
          el.dataset.cols=file.cols;
          el.dataset.rows=file.rows;
          el.addEventListener(file.type==='video'?'loadedmetadata':'load',()=>{
            if(el.dataset.cols && el.dataset.rows) return;
            const w=el.videoWidth||el.naturalWidth,
                  h=el.videoHeight||el.naturalHeight;
            // approximate cell spans based on ~100px per cell
            const cw=Math.max(1,Math.round(w/100));
            const ch=Math.max(1,Math.round(h/100));
            const d=gcd(cw,ch);
            const rw=cw/d, rh=ch/d;
            const scale=Math.max(1,Math.ceil(minCells/Math.max(rw,rh)));
            el.dataset.cols=rw*scale;
            el.dataset.rows=rh*scale;
          });
          el.addEventListener('dragstart',e=>{
            const payload=JSON.stringify({
              src:el.dataset.src,
              type:el.dataset.type,
              cols:el.dataset.cols,
              rows:el.dataset.rows
            });
            // provide both custom and plain text types for compatibility
            e.dataTransfer.setData('application/json',payload);
            e.dataTransfer.setData('text/plain',payload);
          });
          fileList.appendChild(el);
        });loadLayout(folder);
      }).catch(_=>fileList.innerHTML='<div class="error">Error loading files.json</div>');
    });

    function saveLayout(folder){
      const {step}=getSizes(),items=[];
      document.querySelectorAll('.placed').forEach(el=>{
        const col=Math.round(parseFloat(el.style.left)/step);
        const row=Math.round(parseFloat(el.style.top)/step);
        items.push({
          src:el.dataset.src||'',
          type:el.dataset.type,
          text:el.dataset.text||'',
          col,row,
          cols:parseFloat(el.dataset.cols),
          rows:parseFloat(el.dataset.rows),
          fontScale:parseFloat(el.dataset.fontScale)||1
        });
      });
      localStorage.setItem(`layout_${folder}`,JSON.stringify(items));
    }
    function loadLayout(folder){
      document.querySelectorAll('.placed').forEach(el=>el.remove());
      const raw=localStorage.getItem(`layout_${folder}`);
      if(!raw) return;
      const items=JSON.parse(raw);
      items.forEach(it=>placeMedia(it.text||it.src,it.type,it.col,it.row,it.cols,it.rows,false,it.fontScale||1));
    }

    gridContainer.addEventListener('dragover',e=>e.preventDefault());
    gridContainer.addEventListener('drop', e => {
      e.preventDefault();
      let data = e.dataTransfer.getData('application/json') || e.dataTransfer.getData('text/plain');
      let info = {};
      try{ info = JSON.parse(data); }catch{}
      let src = info.src || e.dataTransfer.getData('text/plain');
      let type = info.type || (/\.(mp4|webm)$/i.test(src) ? 'video' : 'image');
      let colsSpan = parseInt(info.cols,10);
      let rowsSpan = parseInt(info.rows,10);
      if(!(colsSpan>0&&rowsSpan>0)){
        const thumb=document.querySelector(`.draggable-item[src="${src}"]`);
        colsSpan=thumb?parseInt(thumb.dataset.cols,10):minCells;
        rowsSpan=thumb?parseInt(thumb.dataset.rows,10):minCells;
      }
      const { step } = getSizes();
      const rect = gridContainer.getBoundingClientRect();
      const col = Math.floor((e.clientX - rect.left) / step);
      const row = Math.floor((e.clientY - rect.top) / step);
      placeMedia(src, type, col, row, colsSpan, rowsSpan, true, 1);
    });

    function placeMedia(src,type,col,row,colsSpan,rowsSpan,doSave,fontScale=1){
      const {size, step}=getSizes();
      const c=Math.min(Math.max(0,col),cols-colsSpan),r=Math.min(Math.max(0,row),rows-rowsSpan);
      const wrap=document.createElement('div');
      wrap.className='placed';
      wrap.dataset.type=type;
      wrap.dataset.src=type==='text'?'' : src;
      wrap.dataset.text=type==='text'?src:'';
      wrap.dataset.cols=colsSpan;
      wrap.dataset.rows=rowsSpan;
      wrap.dataset.fontScale=fontScale;
      wrap.style.left=`${c*step}px`;
      wrap.style.top=`${r*step}px`;
      wrap.style.width=`${colsSpan*size+(colsSpan-1)*gap}px`;
      wrap.style.height=`${rowsSpan*size+(rowsSpan-1)*gap}px`;
      let media;
      if(type==='video'){
        media=document.createElement('video');
        media.controls=false;media.loop=true;media.autoplay=true;media.muted=true;
        media.src=src;
        wrap.addEventListener('dblclick',()=>{
          wrap.dataset.cols = wrap.dataset.cols * 2;
          wrap.dataset.rows = wrap.dataset.rows * 2;
          wrap.style.width = `${wrap.dataset.cols*size + (wrap.dataset.cols-1)*gap}px`;
          wrap.style.height = `${wrap.dataset.rows*size + (wrap.dataset.rows-1)*gap}px`;
          if(doSave) saveLayout(folderSelect.value);
        });
      }else if(type==='image'){
        media=document.createElement('img');
        media.src=src;
        wrap.addEventListener('dblclick',()=>{
          wrap.dataset.cols = wrap.dataset.cols * 2;
          wrap.dataset.rows = wrap.dataset.rows * 2;
          wrap.style.width = `${wrap.dataset.cols*size + (wrap.dataset.cols-1)*gap}px`;
          wrap.style.height = `${wrap.dataset.rows*size + (wrap.dataset.rows-1)*gap}px`;
          if(doSave) saveLayout(folderSelect.value);
        });
      }else{
        media=document.createElement('div');
        media.className='text-item';
        media.contentEditable='true';
        media.textContent=src||'';
        const updateScale=scale=>{
          const {size:sz}=getSizes();
          media.style.fontSize=`${sz*scale}px`;
          media.style.lineHeight=`${sz*scale}px`;
        };
        updateScale(fontScale);
        media.addEventListener('input',()=>{wrap.dataset.text=media.textContent; if(doSave) saveLayout(folderSelect.value);});
        media.addEventListener('keydown',e=>{
          if(e.key==='Enter'){
            e.preventDefault();
            document.execCommand('insertLineBreak');
          }
        });
        wrap.addEventListener('dblclick',()=>{
          const scale=parseFloat(wrap.dataset.fontScale)||1;
          const newScale=scale*2;
          wrap.dataset.fontScale=newScale;
          updateScale(newScale);
          if(doSave) saveLayout(folderSelect.value);
        });
      }
      wrap.appendChild(media);
      // ensure on top when created
      const maxZ=[...document.querySelectorAll('.placed')]
        .reduce((m,el)=>Math.max(m,parseInt(el.style.zIndex)||0),0);
      wrap.style.zIndex=maxZ+1;
      wrap.addEventListener('click', (e) => {
        if (e.detail === 3) {
          wrap.dataset.cols = Math.max(1, Math.floor(wrap.dataset.cols / 4));
          wrap.dataset.rows = Math.max(1, Math.floor(wrap.dataset.rows / 4));
          const { size } = getSizes();
          wrap.style.width = `${wrap.dataset.cols * size + (wrap.dataset.cols - 1) * gap}px`;
          wrap.style.height = `${wrap.dataset.rows * size + (wrap.dataset.rows - 1) * gap}px`;
          if (doSave) saveLayout(folderSelect.value);
        }
      });
      wrap.addEventListener('mousedown', e=>{
        if(e.button!==0) return;
        wrap._deleteTimer = setTimeout(()=>{ wrap.remove(); if(doSave) saveLayout(folderSelect.value); }, 3000);
      });
      wrap.addEventListener('mouseup',()=> clearTimeout(wrap._deleteTimer));
      gridContainer.appendChild(wrap);
      makeDraggable(wrap, step, folderSelect.value);
      if(doSave) saveLayout(folderSelect.value);
    }

    function makeDraggable(el, step, folder){
      let offX,offY;
      el.addEventListener('mousedown', e=>{
        if(e.button!==0) return;
        e.stopPropagation();
        offX = e.clientX - el.getBoundingClientRect().left;
        offY = e.clientY - el.getBoundingClientRect().top;
        const maxZ=[...document.querySelectorAll('.placed')]
          .reduce((m,el)=>Math.max(m,parseInt(el.style.zIndex)||0),0);
        el.style.zIndex = maxZ + 1;
        const onMove = ev => {
          const rect = gridContainer.getBoundingClientRect();
          let x = ev.clientX - rect.left - offX;
          let y = ev.clientY - rect.top - offY;
          x = Math.max(0, Math.min(rect.width - el.offsetWidth, x));
          y = Math.max(0, Math.min(rect.height - el.offsetHeight, y));
          el.style.left = `${x}px`;
          el.style.top = `${y}px`;
        };
        document.addEventListener('mousemove', onMove);
        document.addEventListener('mouseup', ()=>{
          document.removeEventListener('mousemove', onMove);
          const left = parseFloat(el.style.left), top = parseFloat(el.style.top);
          const col = Math.floor(left/step), row = Math.floor(top/step);
          el.style.left = `${col*step}px`;
          el.style.top = `${row*step}px`;
          saveLayout(folder);
        }, { once: true });
      });
    }

    addTextBtn.addEventListener('click',()=>{
      const c=parseInt(prompt('Cols (cells):','4'),10);
      if(!c) return;
      const r=parseInt(prompt('Rows (cells):','2'),10);
      if(!r) return;
      if(!(c>0 && r>0)) return alert('Invalid size');
      const col=Math.floor(cols/2 - c/2), row=Math.floor(rows/2 - r/2);
      placeMedia('Edit me','text',col,row,c,r,true,1);
    });
  </script>
</body>
</html>
